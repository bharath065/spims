version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: pharmacy_db
    env_file: .env.example
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacy_user -d pharmacy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacy_backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://pharmacy_user:pharmacy_pass@db:5432/pharmacy_db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── ML Module (FastAPI) ───────────────────────────────────────────────────
  ml_module:
    build:
      context: ./ml_module
      dockerfile: Dockerfile
    container_name: pharmacy_ml
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://pharmacy_user:pharmacy_pass@db:5432/pharmacy_db
      SAVED_MODELS_DIR: /app/saved_models
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml_module:/app
      - ml_saved_models:/app/saved_models
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ── Chatbot service ────────────────────────────────────────────────────────
  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: pharmacy_chatbot
    env_file: .env.example
    ports:
      - "8002:8002"
    depends_on:
      - backend
      - ml_module

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmacy_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  ml_saved_models:
postgres:
  image: postgres:15
  environment:
    POSTGRES_DB: spims_db
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres123
  ports:
    - "5432:5432"
